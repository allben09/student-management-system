<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 p-0 bg-dark min-vh-100">
                <div class="p-3">
                    <h4 class="text-white text-center mb-4">🎓 SMS</h4>
                    <nav class="nav flex-column">
                        <a class="nav-link text-white" href="/dashboard">📊 Dashboard</a>
                        <a class="nav-link text-white active bg-primary" href="/students">👨‍🎓 Students</a>
                        <a class="nav-link text-white" href="#">📚 Courses</a>
                        <a class="nav-link text-white" href="#">📝 Grades</a>
                        <a class="nav-link text-white" href="#">📄 Reports</a>
                        <hr class="border-light">
                        <a class="nav-link text-danger" href="#">🚪 Logout</a>
                    </nav>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>👨‍🎓 Students</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStudentModal">
                        <i class="bi bi-plus-circle"></i> Add Student
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search by name, email, or ID...">
                            <button class="btn btn-primary" id="searchBtn">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Students Table -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>GPA</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted">Loading students...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span id="paginationInfo">Showing 0 of 0</span>
                            <div>
                                <button class="btn btn-sm btn-outline-primary" id="prevPage">Previous</button>
                                <span class="mx-2" id="pageInfo">Page 1</span>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div class="modal fade" id="addStudentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addStudentForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="studentName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" id="studentEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="studentPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="studentAddress" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveStudentBtn">Save Student</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = '';

        // Load students
        async function loadStudents(page = 1, search = '') {
            try {
                const url = `/api/students?page=${page}&limit=10&search=${encodeURIComponent(search)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load students');
                const data = await response.json();
                
                const tbody = document.getElementById('studentsTableBody');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No students found</td></tr>';
                } else {
                    tbody.innerHTML = data.data.map(student => `
                        <tr>
                            <td><strong>${student.student_id}</strong></td>
                            <td>${student.name}</td>
                            <td>${student.email}</td>
                            <td>${student.phone || '-'}</td>
                            <td><span class="badge bg-${student.gpa >= 70 ? 'success' : student.gpa >= 50 ? 'warning' : 'danger'}">${student.gpa.toFixed(2)}</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-info" onclick="viewStudent(${student.id})">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-warning" onclick="editStudent(${student.id})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${student.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
                
                totalPages = data.pages || 1;
                document.getElementById('paginationInfo').textContent = `Showing ${data.data.length} of ${data.total}`;
                document.getElementById('pageInfo').textContent = `Page ${data.page} of ${data.pages}`;
                document.getElementById('prevPage').disabled = data.page <= 1;
                document.getElementById('nextPage').disabled = data.page >= data.pages;
                currentPage = data.page;
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentsTableBody').innerHTML = 
                    '<tr><td colspan="6" class="text-center text-danger">Error loading students</td></tr>';
            }
        }

        // Pagination
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) loadStudents(currentPage - 1, searchQuery);
        });
        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage < totalPages) loadStudents(currentPage + 1, searchQuery);
        });

        // Search
        document.getElementById('searchBtn').addEventListener('click', () => {
            searchQuery = document.getElementById('searchInput').value;
            loadStudents(1, searchQuery);
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchQuery = document.getElementById('searchInput').value;
                loadStudents(1, searchQuery);
            }
        });

        // Add student
        document.getElementById('saveStudentBtn').addEventListener('click', async () => {
            const data = {
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                phone: document.getElementById('studentPhone').value,
                address: document.getElementById('studentAddress').value
            };
            
            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('✅ Student added successfully!');
                    document.getElementById('addStudentForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('addStudentModal')).hide();
                    loadStudents(currentPage, searchQuery);
                } else {
                    const error = await response.json();
                    alert('❌ Error: ' + error.msg);
                }
            } catch (error) {
                alert('❌ Error adding student');
                console.error(error);
            }
        });

        // Delete student
        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;
            
            try {
                const response = await fetch(`/api/students/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('✅ Student deleted successfully');
                    loadStudents(currentPage, searchQuery);
                } else {
                    alert('❌ Error deleting student');
                }
            } catch (error) {
                alert('❌ Error deleting student');
                console.error(error);
            }
        }

        function viewStudent(id) {
            alert('View student functionality coming soon!');
        }

        function editStudent(id) {
            alert('Edit student functionality coming soon!');
        }

        // Load initial students
        loadStudents();
    </script>
</body>
</html>
