<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: #34495e;
        }
        .stat-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            font-size: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 p-0 sidebar">
                <div class="p-3">
                    <h4 class="text-white text-center mb-4">🎓 SMS</h4>
                    <nav class="nav flex-column">
                        <a class="nav-link active" href="/dashboard">📊 Dashboard</a>
                        <a class="nav-link" href="/students">👨‍🎓 Students</a>
                        <a class="nav-link" href="#">📚 Courses</a>
                        <a class="nav-link" href="#">📝 Grades</a>
                        <a class="nav-link" href="#">📄 Reports</a>
                        <hr class="border-light">
                        <a class="nav-link text-danger" href="#">🚪 Logout</a>
                    </nav>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>Dashboard</h1>
                    <div>
                        <span class="badge bg-primary fs-6 me-2">Admin</span>
                        <span class="text-muted">Welcome back!</span>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted">Total Students</h6>
                                        <h2 class="mb-0" id="totalStudents">-</h2>
                                    </div>
                                    <div class="stat-icon">👨‍🎓</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted">Total Courses</h6>
                                        <h2 class="mb-0" id="totalCourses">-</h2>
                                    </div>
                                    <div class="stat-icon">📚</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted">Enrollments</h6>
                                        <h2 class="mb-0" id="totalEnrollments">-</h2>
                                    </div>
                                    <div class="stat-icon">📝</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted">Average GPA</h6>
                                        <h2 class="mb-0" id="avgGpa">-</h2>
                                    </div>
                                    <div class="stat-icon">⭐</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">Course Enrollment Distribution</div>
                            <div class="card-body">
                                <canvas id="enrollmentChart" height="250"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">Quick Actions</div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-primary">➕ Add New Student</button>
                                    <button class="btn btn-success">📚 Create Course</button>
                                    <button class="btn btn-warning">📝 Enroll Student</button>
                                    <button class="btn btn-info">📄 Generate Report</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fetch dashboard stats
        async function loadStats() {
            try {
                const response = await fetch('/api/dashboard/stats');
                if (!response.ok) throw new Error('Failed to fetch stats');
                const data = await response.json();
                
                document.getElementById('totalStudents').textContent = data.total_students;
                document.getElementById('totalCourses').textContent = data.total_courses;
                document.getElementById('totalEnrollments').textContent = data.total_enrollments;
                document.getElementById('avgGpa').textContent = data.avg_gpa.toFixed(2);
                
                // Create enrollment chart
                const ctx = document.getElementById('enrollmentChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.course_distribution.map(c => c.name),
                        datasets: [{
                            label: 'Enrolled Students',
                            data: data.course_distribution.map(c => c.enrolled),
                            backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'],
                            borderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 1 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        loadStats();
    </script>
</body>
</html>
